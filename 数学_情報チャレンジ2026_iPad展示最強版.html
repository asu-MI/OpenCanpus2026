<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>数学・情報チャレンジ 2026</title>
<style>
/* =============================================
   DESIGN TOKENS
   カラーパレット: 深宇宙 × 数式グリーン
   Signature: 問題カードの「数式光彩」効果
============================================= */
:root {
  --bg:       #07111d;
  --surface:  #0d1e30;
  --surface2: #122640;
  --border:   rgba(255,255,255,.10);
  --border2:  rgba(255,255,255,.18);

  /* アクセント: シアン → グリーン の数学グラデ */
  --a1: #00e5c8;
  --a2: #00b4d8;
  --a3: #9c6fff;

  /* ステート */
  --ok:   #00e676;
  --ng:   #ff3d6e;
  --warn: #ffb300;

  /* テキスト */
  --tx:   #eef6ff;
  --muted:#8faec8;

  /* 共通トランジション */
  --ease: cubic-bezier(.4,0,.2,1);
}

/* =============================================
   RESET & BASE
============================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  height: 100%;
  -webkit-text-size-adjust: 100%;
  touch-action: manipulation;
}

body {
  min-height: 100%;
  background: var(--bg);
  color: var(--tx);
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
  overflow: hidden;
  background-image:
    radial-gradient(ellipse 60% 40% at 10% 5%,  rgba(0,229,200,.15) 0%, transparent 55%),
    radial-gradient(ellipse 50% 35% at 90% 10%,  rgba(156,111,255,.12) 0%, transparent 50%),
    radial-gradient(ellipse 80% 60% at 50% 110%, rgba(0,180,216,.08) 0%, transparent 60%);
}

button, input {
  font: inherit;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  border: none;
  outline: none;
  cursor: pointer;
  color: inherit;
}

/* =============================================
   LAYOUT SHELL
============================================= */
#app {
  height: 100dvh;
  display: flex;
  flex-direction: column;
  padding: env(safe-area-inset-top, 16px) env(safe-area-inset-right, 24px) env(safe-area-inset-bottom, 16px) env(safe-area-inset-left, 24px);
  padding-top: max(env(safe-area-inset-top, 0px), 16px);
  padding-bottom: max(env(safe-area-inset-bottom, 0px), 12px);
  gap: 12px;
}

/* =============================================
   TOP BAR
============================================= */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  flex-shrink: 0;
  min-height: 48px;
}

.brand {
  font-size: clamp(15px, 2.2vw, 22px);
  font-weight: 900;
  letter-spacing: .06em;
  background: linear-gradient(100deg, var(--a1), #fff 55%, var(--a3));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  white-space: nowrap;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: nowrap;
}

/* ピル型バッジ */
.pill {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 7px 13px;
  border-radius: 999px;
  border: 1px solid var(--border2);
  background: rgba(255,255,255,.06);
  font-size: clamp(12px, 1.6vw, 16px);
  font-weight: 700;
  white-space: nowrap;
  color: var(--a1);
}

.pill.score { color: #ffc107; }
.pill.subject-pill { max-width: 120px; overflow: hidden; text-overflow: ellipsis; }

/* サウンドボタン */
.sound-btn {
  padding: 7px 13px;
  border-radius: 999px;
  border: 1px solid var(--border2);
  background: rgba(255,255,255,.06);
  font-size: clamp(11px, 1.4vw, 14px);
  font-weight: 700;
  color: var(--muted);
  transition: color .2s var(--ease), border-color .2s;
}
.sound-btn.on { color: var(--a1); border-color: rgba(0,229,200,.35); }

/* タイマー */
.timer {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: 999px;
  border: 1.5px solid rgba(0,229,200,.3);
  background: rgba(0,229,200,.07);
  font-weight: 900;
  font-size: clamp(16px, 2.2vw, 24px);
  color: var(--a1);
  min-width: 72px;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: border-color .3s, background .3s, opacity .3s;
}
.timer.show { opacity: 1; pointer-events: auto; }
.timer.urgent {
  border-color: var(--ng);
  background: rgba(255,61,110,.14);
  color: var(--ng);
  animation: pulse .5s infinite alternate;
}
@keyframes pulse { to { transform: scale(1.05); } }

/* プログレスバー */
.prog-wrap {
  width: clamp(60px, 10vw, 160px);
  height: 8px;
  background: rgba(255,255,255,.08);
  border-radius: 999px;
  overflow: hidden;
}
.prog-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--a1), var(--a3));
  border-radius: 999px;
  transition: width .35s var(--ease);
}

/* =============================================
   SCREENS
============================================= */
.screen {
  display: none;
  flex: 1;
  min-height: 0;
}
.screen.active { display: grid; }

/* グリッドレイアウト: 左右2ペイン */
.two-pane {
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.one-pane {
  grid-template-columns: 1fr;
}

/* カード */
.card {
  background: linear-gradient(160deg, var(--surface) 0%, rgba(7,15,26,.97) 100%);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: clamp(18px, 2.8vw, 36px);
  overflow: auto;
  -webkit-overflow-scrolling: touch;
  position: relative;
}
.card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 24px;
  pointer-events: none;
  background: linear-gradient(160deg, rgba(255,255,255,.04) 0%, transparent 50%);
}

.card-center {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 16px;
}

/* =============================================
   TITLE SCREEN
============================================= */
#screen-title {
  /* overrideでアクティブ時 grid に */
}

.title-hero {
  font-size: clamp(44px, 8.5vw, 90px);
  font-weight: 900;
  line-height: 1.04;
  background: linear-gradient(125deg, var(--a1) 0%, #fff 45%, var(--a3) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.title-sub {
  font-size: clamp(14px, 1.8vw, 20px);
  color: var(--muted);
  line-height: 1.75;
}

.tag-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 4px;
}
.tag {
  padding: 6px 13px;
  border-radius: 999px;
  border: 1px solid rgba(0,229,200,.3);
  background: rgba(0,229,200,.07);
  font-size: clamp(11px, 1.4vw, 14px);
  font-weight: 700;
  color: var(--a1);
}

.sec-heading {
  font-size: clamp(18px, 2.6vw, 28px);
  font-weight: 900;
  margin-bottom: 14px;
  color: var(--tx);
}

/* =============================================
   BUTTONS
============================================= */
.btn-primary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 18px 28px;
  border-radius: 18px;
  background: linear-gradient(135deg, #0099d8, #6a4fff);
  color: #fff;
  font-weight: 900;
  font-size: clamp(16px, 2vw, 22px);
  box-shadow: 0 8px 24px rgba(0,153,216,.28);
  transition: transform .15s var(--ease), box-shadow .15s;
  -webkit-tap-highlight-color: transparent;
}
.btn-primary:active { transform: scale(.96); box-shadow: none; }

.btn-secondary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 16px 24px;
  border-radius: 18px;
  border: 2px solid rgba(0,229,200,.4);
  background: transparent;
  color: var(--a1);
  font-weight: 700;
  font-size: clamp(14px, 1.7vw, 18px);
  transition: background .15s, transform .15s var(--ease);
}
.btn-secondary:active { transform: scale(.96); background: rgba(0,229,200,.08); }

/* =============================================
   HOWTO SCREEN
============================================= */
.howto-symbol {
  font-size: clamp(72px, 14vw, 160px);
  color: var(--a1);
  filter: drop-shadow(0 0 28px rgba(0,229,200,.35));
  align-self: center;
  user-select: none;
}

/* =============================================
   SUBJECT SCREEN
============================================= */
.name-input {
  width: 100%;
  padding: 16px 18px;
  border-radius: 16px;
  border: 2px solid var(--border2);
  background: rgba(5,12,22,.8);
  color: #fff;
  font-size: clamp(16px, 2vw, 20px);
  font-weight: 700;
  transition: border-color .2s;
}
.name-input:focus { border-color: var(--a1); }
.name-input::placeholder { color: var(--muted); font-weight: 400; }

.subject-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.btn-subject {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 4px;
  padding: 16px 18px;
  border-radius: 18px;
  background: var(--surface2);
  border: 2px solid var(--border);
  text-align: left;
  min-height: 90px;
  transition: border-color .18s, background .18s, transform .15s var(--ease);
}
.btn-subject:active { transform: scale(.97); }
.btn-subject:hover  { border-color: rgba(0,229,200,.4); background: rgba(0,229,200,.06); }

.btn-subject strong {
  display: block;
  font-size: clamp(14px, 1.8vw, 18px);
  color: var(--a1);
  font-weight: 900;
}
.btn-subject span {
  font-size: clamp(10px, 1.2vw, 13px);
  color: var(--muted);
  line-height: 1.45;
}

/* =============================================
   QUIZ SCREEN
   signature: 問題カードの上辺グロー
============================================= */
#screen-quiz .card.question-card {
  border-top: 2px solid transparent;
  background-image:
    linear-gradient(160deg, var(--surface) 0%, rgba(7,15,26,.97) 100%),
    linear-gradient(90deg, var(--a1), var(--a3));
  background-origin: border-box;
  background-clip: padding-box, border-box;
  border-image: none; /* fallback */
}

/* Safari 対応: 上辺グローは ::after で代用 */
#screen-quiz .card.question-card::after {
  content: '';
  position: absolute;
  top: -1px; left: 10%; right: 10%;
  height: 2px;
  border-radius: 999px;
  background: linear-gradient(90deg, transparent, var(--a1), var(--a3), transparent);
  filter: blur(1px);
}

.qhead {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 10px;
}
.q-no {
  font-size: clamp(11px, 1.3vw, 14px);
  font-weight: 800;
  letter-spacing: .08em;
  color: var(--a1);
  text-transform: uppercase;
}
.level-badge {
  padding: 5px 11px;
  border-radius: 999px;
  border: 1px solid var(--border2);
  font-size: clamp(10px, 1.2vw, 13px);
  font-weight: 700;
  color: #ffc107;
  background: rgba(255,193,7,.08);
  white-space: nowrap;
}

.question-text {
  font-size: clamp(22px, 3.8vw, 48px);
  font-weight: 900;
  line-height: 1.3;
  margin: 12px 0 22px;
  word-break: break-word;
}

/* 選択肢グリッド: 2×2 */
.choices-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.btn-choice {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 4px;
  padding: 16px 18px;
  border-radius: 18px;
  background: var(--surface2);
  border: 2px solid var(--border);
  text-align: left;
  min-height: 80px;
  font-size: clamp(16px, 2.1vw, 24px);
  font-weight: 800;
  line-height: 1.3;
  transition: border-color .15s, background .15s, transform .12s var(--ease);
}
.btn-choice:active:not(:disabled) { transform: scale(.97); }
.btn-choice:not(:disabled):hover  { border-color: rgba(255,255,255,.25); background: rgba(255,255,255,.05); }

.choice-label {
  font-size: clamp(10px, 1.2vw, 13px);
  font-weight: 700;
  color: var(--muted);
  letter-spacing: .06em;
}

/* 正解・不正解アニメ */
.btn-choice.correct {
  border-color: var(--ok) !important;
  background: rgba(0,230,118,.13) !important;
  animation: correctPulse .55s var(--ease) both;
}
.btn-choice.wrong {
  border-color: var(--ng) !important;
  background: rgba(255,61,110,.13) !important;
  animation: wrongShake .4s var(--ease) both;
}
.btn-choice.dim { opacity: .38; }
.btn-choice:disabled { pointer-events: none; }

@keyframes correctPulse {
  40% { transform: scale(1.04); box-shadow: 0 0 30px rgba(0,230,118,.45); }
}
@keyframes wrongShake {
  0%,100% { transform: translateX(0); }
  20%      { transform: translateX(-9px); }
  40%      { transform: translateX(9px); }
  60%      { transform: translateX(-6px); }
  80%      { transform: translateX(6px); }
}

/* =============================================
   FEEDBACK PANEL
============================================= */
.feedback-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 14px;
  min-height: 0;
  overflow: auto;
  -webkit-overflow-scrolling: touch;
}

.feedback-idle {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(13px, 1.6vw, 17px);
  color: var(--muted);
  text-align: center;
  line-height: 1.7;
}

.feedback-result {
  display: none;
  flex-direction: column;
  gap: 10px;
}
.feedback-result.show { display: flex; }

.verdict {
  font-size: clamp(34px, 5.5vw, 64px);
  font-weight: 900;
  line-height: 1.1;
}
.verdict.ok    { color: var(--ok); }
.verdict.ng    { color: var(--ng); }
.verdict.time  { color: var(--warn); }

.ans-row {
  font-size: clamp(14px, 1.7vw, 19px);
  line-height: 1.7;
}
.ans-row strong { color: var(--tx); font-weight: 800; }

.expl-box {
  border-left: 4px solid var(--a1);
  background: rgba(0,229,200,.06);
  border-radius: 0 14px 14px 0;
  padding: 12px 16px;
  font-size: clamp(13px, 1.5vw, 17px);
  color: #d0ecff;
  font-weight: 700;
  line-height: 1.7;
}

.hint-text {
  font-size: clamp(11px, 1.3vw, 14px);
  color: var(--muted);
  font-style: italic;
  margin-top: 2px;
}

.btn-next {
  display: none;
  margin-top: auto;
}
.btn-next.show { display: inline-flex; }

/* =============================================
   RESULT SCREEN
============================================= */
.big-score {
  font-size: clamp(60px, 11vw, 120px);
  font-weight: 900;
  color: #ffc107;
  line-height: 1;
  letter-spacing: -.02em;
}
.rank-text {
  font-size: clamp(18px, 2.8vw, 34px);
  font-weight: 900;
  color: var(--a1);
}
.final-msg {
  font-size: clamp(13px, 1.6vw, 18px);
  color: var(--muted);
  line-height: 1.75;
}
.result-btns {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 6px;
}

.history-list { display: flex; flex-direction: column; gap: 8px; }
.hist-row {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 10px;
  padding: 11px 14px;
  border-radius: 14px;
  background: rgba(255,255,255,.05);
}
.hist-row .q-text {
  font-size: clamp(11px, 1.3vw, 14px);
  color: var(--muted);
  line-height: 1.5;
}
.hist-row .your-ans {
  font-size: clamp(10px, 1.2vw, 13px);
  margin-top: 3px;
}
.hist-mark {
  font-size: clamp(18px, 2vw, 24px);
  font-weight: 900;
}

/* =============================================
   SCREEN FLASH
============================================= */
#app.flash-ok::after,
#app.flash-ng::after,
#app.flash-time::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 100;
  pointer-events: none;
  animation: screenFlash .5s var(--ease) forwards;
}
#app.flash-ok::after   { background: rgba(0,230,118,.16); }
#app.flash-ng::after   { background: rgba(255,61,110,.16); }
#app.flash-time::after { background: rgba(255,179,0,.16); }
@keyframes screenFlash { 0%{opacity:0} 25%{opacity:1} 100%{opacity:0} }

/* =============================================
   CONFETTI
============================================= */
.confetti-piece {
  position: fixed;
  top: -20px;
  z-index: 90;
  pointer-events: none;
  font-size: 22px;
  animation: confettiFall 1.6s ease-in forwards;
}
@keyframes confettiFall {
  to { transform: translateY(108vh) rotate(700deg); opacity: 0; }
}

/* =============================================
   RESPONSIVE: iPad mini / portrait
============================================= */
@media (max-width: 900px) {
  body { overflow: auto; }
  #app {
    height: auto;
    min-height: 100dvh;
    padding: 14px 16px max(env(safe-area-inset-bottom,0px), 12px);
    padding-top: max(env(safe-area-inset-top,0px), 14px);
  }
  .screen.two-pane {
    grid-template-columns: 1fr;
    /* クイズ画面: 問題→フィードバックの順序を保つ */
  }
  .choices-grid { grid-template-columns: 1fr 1fr; }
  .subject-grid { grid-template-columns: 1fr 1fr; }
  .topbar { flex-wrap: wrap; }
  .title-hero { font-size: clamp(36px, 9vw, 60px); }
  .big-score  { font-size: clamp(52px, 14vw, 88px); }
}

@media (max-width: 480px) {
  .choices-grid { grid-template-columns: 1fr; }
  .subject-grid { grid-template-columns: 1fr; }
}

/* =============================================
   REDUCED MOTION
============================================= */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
}

/* ===== iPad展示最強版 追加調整 ===== */
#screen-title.screen.active{display:grid;}
#screen-subject.screen.active{display:grid;}
#screen-quiz.screen.active{display:grid;}
#screen-result.screen.active{display:grid;}
.choices-grid{grid-template-columns:1fr !important; gap:12px;}
.btn-choice{min-height:74px; padding:18px 22px; font-size:clamp(18px,2.4vw,28px);}
.center-timer{
  align-self:center; margin-bottom:12px; padding:12px 26px; border-radius:999px;
  border:2px solid rgba(0,229,200,.35); background:rgba(0,229,200,.08);
  color:var(--a1); font-size:clamp(20px,3.2vw,38px); font-weight:900;
  letter-spacing:.04em; box-shadow:0 0 22px rgba(0,229,200,.10);
}
.center-timer.urgent{color:var(--ng); border-color:rgba(255,61,110,.7); background:rgba(255,61,110,.14); animation:pulse .5s infinite alternate;}
.question-text{font-size:clamp(26px,4.2vw,52px);}
.btn-primary{min-height:64px;}
.streak-msg{display:none; padding:10px 14px; border-radius:14px; background:rgba(255,179,0,.14); color:#ffc107; font-weight:900; font-size:clamp(16px,2vw,24px);}
.streak-msg.show{display:block; animation:correctPulse .55s var(--ease) both;}
.auto-next{font-size:clamp(12px,1.4vw,16px); color:var(--muted); font-weight:800;}
.perfect-overlay{
  position:fixed; inset:0; z-index:300; display:none; place-items:center; text-align:center;
  background:radial-gradient(circle at center, rgba(255,193,7,.24), rgba(7,17,29,.92) 60%);
  color:#ffc107; font-weight:900; pointer-events:none;
}
.perfect-overlay.show{display:grid; animation:perfectPop 1.8s var(--ease) forwards;}
.perfect-overlay div{font-size:clamp(48px,10vw,120px); filter:drop-shadow(0 0 30px rgba(255,193,7,.65));}
.perfect-overlay span{display:block; margin-top:14px; color:#fff; font-size:clamp(22px,4vw,52px);}
@keyframes perfectPop{0%{opacity:0;transform:scale(.9)}15%{opacity:1;transform:scale(1.04)}80%{opacity:1}100%{opacity:0;transform:scale(1)}}
@media (min-width: 901px){#screen-quiz.two-pane{grid-template-columns:1.08fr .92fr;}}
@media (max-width:900px){.topbar-right{width:100%; justify-content:space-between}.timer{display:none}.prog-wrap{flex:1; min-width:90px}.card{border-radius:22px}.btn-choice{min-height:78px}}

</style>
</head>
<body>
<div id="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="brand">数学・情報チャレンジ 2026</div>
    <div class="topbar-right">
      <button class="sound-btn on" id="soundBtn">♪ ON</button>
      <span class="pill subject-pill" id="subjectPill">未選択</span>
      <span class="pill score" id="scorePill">0 / 10</span>
      <div class="timer" id="timer">
        <span id="timeNum">--</span>
      </div>
      <div class="prog-wrap"><div class="prog-fill" id="prog"></div></div>
    </div>
  </div>

  <!-- ========== TITLE ========== -->
  <section id="screen-title" class="screen two-pane active">

function $(id) { return document.getElementById(id); }

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

  clearAutoNext();
  $('perfectOverlay').classList.remove('show');
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
  $('timer').classList.toggle('show', id === 'screen-quiz');
}

/* =============================================
   AUDIO ENGINE
   Web Audio API のみ使用（軽量）
============================================= */
function getAudioCtx() {
  if (!audioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (AC) { audioCtx = new AC(); }
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function beep(kind) {
  if (!soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    if (!ctx) return;
    const now = ctx.currentTime;

    if (kind === 'ok') {
      // 正解: 上昇アルペジオ
      [523, 659, 784, 1047].forEach((freq, k) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.0001, now + k * .07);
        gain.gain.exponentialRampToValueAtTime(.38, now + k * .07 + .015);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + k * .07 + .22);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(now + k * .07); osc.stop(now + k * .07 + .25);
      });
    } else if (kind === 'ng') {
      // 不正解: 下降和音
      [220, 180, 140].forEach((freq, k) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(freq, now + k * .06);
        gain.gain.setValueAtTime(0.0001, now + k * .06);
        gain.gain.exponentialRampToValueAtTime(.28, now + k * .06 + .012);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + k * .06 + .18);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(now + k * .06); osc.stop(now + k * .06 + .22);
      });
    } else if (kind === 'tick') {
      // タイマー警告
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(.13, now + .008);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + .08);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(now); osc.stop(now + .1);
    }
  } catch (e) { /* silent fail */ }
}

/* =============================================
   SCREEN FLASH
============================================= */
function flash(type) {
  const app = $('app');
  app.classList.remove('flash-ok', 'flash-ng', 'flash-time');
  void app.offsetWidth;
  app.classList.add(type === 'ok' ? 'flash-ok' : type === 'time' ? 'flash-time' : 'flash-ng');
  setTimeout(() => app.classList.remove('flash-ok', 'flash-ng', 'flash-time'), 600);
}

/* =============================================
   CONFETTI
============================================= */
function confetti() {
  const marks = ['●', '★', '✦', '◆', '✓'];
  const colors = ['#00e676', '#ffc107', '#00e5c8', '#9c6fff', '#fff'];
  for (let i = 0; i < 28; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.textContent = marks[i % marks.length];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.animationDelay = Math.random() * .35 + 's';
    el.style.color = colors[i % colors.length];
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2100);
  }
}

/* =============================================
   TIMER
============================================= */
function startTimer(sec) {
  clearTimer();
  timeLeft = sec;
  updateTimerDisplay();
  $('timer').classList.remove('urgent');
  timerId = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 5) {
      $('timer').classList.add('urgent');
      beep('tick');
    }
    if (timeLeft <= 0) timeUp();
  }, 1000);
}

function updateTimerDisplay() {
  $('timeNum').textContent = timeLeft;
  const ct = $('centerTimer');
  if (ct) {
    ct.textContent = `残り ${timeLeft} 秒`;
    ct.classList.toggle('urgent', timeLeft <= 5);
  }
}

function clearTimer() {
  if (timerId) { clearInterval(timerId); timerId = null; }
  $('timer').classList.remove('urgent');
  if ($('centerTimer')) $('centerTimer').classList.remove('urgent');
}

/* =============================================
   QUIZ FLOW
============================================= */
function buildQuestions(subj, mistakeList = null) {
  if (mistakeList && mistakeList.length > 0) {
    return mistakeList.map(h => h.qobj);
  }
  // シャッフル後、各問題の lv を使用
  return shuffle(SUBJECTS[subj]).slice(0, TAKE);
}

function startQuiz(subj, mistakeList = null) {
  getAudioCtx(); // warm up
  currentSubject = subj;
  playerName = $('nameInput').value.trim() || '名無し';
  questions = buildQuestions(subj, mistakeList);
  if (questions.length === 0) questions = buildQuestions(subj);
  index = 0; score = 0; answered = false; history = []; streak = 0; maxStreak = 0;
  $('subjectPill').textContent = subjectLabel(subj);
  updateScoreUI();
  show('screen-quiz');
  renderQuestion();
}

function updateScoreUI() {
  $('scorePill').textContent = `${score} / ${TAKE}`;
  $('prog').style.width = `${Math.round(index / TAKE * 100)}%`;
}

function renderQuestion() {
  answered = false;
  const q = questions[index];
  const lv = q.lv || 2;

  $('qNo').textContent = `${subjectLabel(currentSubject)}　Q${index + 1} / ${TAKE}`;
  $('levelLabel').textContent = `Lv.${lv} ${LEVEL_NAME[lv]}`;
  $('levelLabel').style.color = LEVEL_COLORS[lv];
  $('levelLabel').style.borderColor = LEVEL_COLORS[lv] + '60';
  $('levelLabel').style.background = LEVEL_COLORS[lv] + '14';

  $('qText').textContent = q.q;

  // フィードバックリセット
  $('feedbackIdle').style.display = '';
  $('feedbackResult').classList.remove('show');
  $('nextBtn').classList.remove('show');
  $('streakMsg').classList.remove('show');
  $('streakMsg').textContent = '';
  $('autoNextMsg').textContent = '';
  $('nextBtn').textContent = '次の問題へ →';

  // 選択肢
  $('choices').innerHTML = q.cs.map((c, i) => `
    <button class="btn-choice" data-i="${i}">
      <span class="choice-label">${String.fromCharCode(65 + i)}</span>
      <span>${esc(c)}</span>
    </button>
  `).join('');

  $('choices').querySelectorAll('button').forEach(btn =>
    btn.addEventListener('click', () => answer(Number(btn.dataset.i)))
  );

  updateScoreUI();
  startTimer(LEVEL_TIME[lv] || 25);
}

function answer(i, timedOut = false) {
  if (answered) return;
  answered = true;
  clearTimer();

  const q = questions[index];
  const ok = !timedOut && i === q.ans;

  if (ok) { score++; streak++; maxStreak = Math.max(maxStreak, streak); } else { streak = 0; }
  beep(ok ? 'ok' : 'ng');
  flash(timedOut ? 'time' : ok ? 'ok' : 'ng');
  if (ok) confetti();

  const yourAns = timedOut ? '時間切れ' : q.cs[i];
  history.push({ q: q.q, ok, timedOut, your: yourAns, ans: q.cs[q.ans], qobj: q });

  // 選択肢スタイル
  $('choices').querySelectorAll('button').forEach(btn => {
    const bi = Number(btn.dataset.i);
    btn.disabled = true;
    if (bi === q.ans) btn.classList.add('correct');
    else if (!timedOut && bi === i) btn.classList.add('wrong');
    else btn.classList.add('dim');
  });

  // フィードバック表示
  $('feedbackIdle').style.display = 'none';
  const fr = $('feedbackResult');
  fr.classList.add('show');

  const vEl = $('verdict');
  if (timedOut) {
    vEl.textContent = '時間切れ！'; vEl.className = 'verdict time';
  } else if (ok) {
    vEl.textContent = '正解！'; vEl.className = 'verdict ok';
  } else {
    vEl.textContent = '惜しい！'; vEl.className = 'verdict ng';
  }

  $('ansRow').innerHTML = `<strong>正解：</strong>${esc(q.cs[q.ans])}`;
  $('explBox').textContent = q.expl;

  if (ok && streak >= 3) {
    $('streakMsg').textContent = `🔥 ${streak}連続正解！`;
    $('streakMsg').classList.add('show');
  }

  updateScoreUI();
  startAutoNext();
  $('nextBtn').classList.add('show');

  // キーボード対応 (iPad + 物理キーボード)
  $('nextBtn').focus();
}

function timeUp() { answer(-1, true); }

function clearAutoNext() {
  if (autoNextId) { clearTimeout(autoNextId); autoNextId = null; }
  if (autoCountdownId) { clearInterval(autoCountdownId); autoCountdownId = null; }
}

function startAutoNext() {
  clearAutoNext();
  let n = 3;
  $('nextBtn').textContent = index >= questions.length - 1 ? `結果へ（${n}）` : `次の問題へ（${n}）`;
  $('autoNextMsg').textContent = '自動で進みます。すぐ進む場合はボタンをタップ。';
  autoCountdownId = setInterval(() => {
    n--;
    if (n > 0) $('nextBtn').textContent = index >= questions.length - 1 ? `結果へ（${n}）` : `次の問題へ（${n}）`;
  }, 1000);
  autoNextId = setTimeout(() => nextQuestion(), 3000);
}

function nextQuestion() {
  clearAutoNext();
  index++;
  if (index >= questions.length) showResult();
  else renderQuestion();
}

/* =============================================
   RESULT
============================================= */
function showResult() {
  clearTimer();
  show('screen-result');
  $('prog').style.width = '100%';

  const rate = Math.round(score / TAKE * 100);
  lastMistakes = history.filter(h => !h.ok);

  $('finalScore').textContent = `${score} / ${TAKE}`;

  const ranks = [
    [100, 'Sランク 🏆 PERFECT!'],
    [80,  'Aランク ⭐ すばらしい'],
    [60,  'Bランク 👍 いい調子'],
    [40,  'Cランク 📖 復習しよう'],
    [0,   'Dランク 🔁 再挑戦'],
  ];
  $('rankText').textContent = ranks.find(([t]) => rate >= t)[1];

  $('finalMsg').textContent =
    `${playerName}さんの正答率は ${rate}% です。最高連続正解は ${maxStreak} 問です。` +
    (lastMistakes.length ? `間違えた問題は ${lastMistakes.length} 問です。` : '全問正解です！🎉');
  if (score === TAKE) {
    $('perfectOverlay').classList.add('show');
    for (let i = 0; i < 3; i++) setTimeout(confetti, i * 350);
  }

  $('mistakeBtn').style.display = lastMistakes.length ? '' : 'none';

  $('historyList').innerHTML = history.map((h, n) => `
    <div class="hist-row">
      <div>
        <div class="q-text">Q${n + 1}　${esc(h.q)}</div>
        <div class="your-ans" style="color:${h.ok ? 'var(--ok)' : 'var(--ng)'}">
          あなた：${esc(h.your)}　／　正解：${esc(h.ans)}
        </div>
      </div>
      <div class="hist-mark" style="color:${h.ok ? 'var(--ok)' : 'var(--ng)'}">${h.ok ? '○' : '×'}</div>
    </div>
  `).join('');
}

/* =============================================
   INIT
============================================= */
function init() {
  // タグ一覧
  $('tagList').innerHTML = SUBJECT_ORDER
    .map(s => `<span class="tag">${esc(subjectLabel(s))}</span>`).join('');

  // 分野ボタン
  $('subjectGrid').innerHTML = SUBJECT_ORDER
    .map(s => `
      <button class="btn-subject" data-subject="${esc(s)}">
        <strong>${esc(subjectLabel(s))}</strong>
        <span>難易度別タイマー 10問</span>
      </button>
    `).join('');

  // イベント
  $('startBtn').addEventListener('click', () => { getAudioCtx(); show('screen-subject'); });
  $('nextBtn').addEventListener('click', nextQuestion);
  $('retryBtn').addEventListener('click', () => startQuiz(currentSubject));
  $('backSubjectBtn').addEventListener('click', () => show('screen-subject'));
  $('mistakeBtn').addEventListener('click', () => {
    if (lastMistakes.length) startQuiz(currentSubject, lastMistakes);
  });

  $('subjectGrid').addEventListener('click', e => {
    const btn = e.target.closest('[data-subject]');
    if (btn) startQuiz(btn.dataset.subject);
  });

  $('soundBtn').addEventListener('click', () => {
    soundEnabled = !soundEnabled;
    $('soundBtn').textContent = soundEnabled ? '♪ ON' : '♪ OFF';
    $('soundBtn').classList.toggle('on', soundEnabled);
    if (soundEnabled) getAudioCtx();
  });

  // キーボードショートカット (物理キーボード接続時)
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') {
      const nb = $('nextBtn');
      if (nb.classList.contains('show')) { e.preventDefault(); nextQuestion(); }
    }
    // 数字キー1〜4で選択肢選択
    if (['1','2','3','4'].includes(e.key) && !answered) {
      const btns = $('choices').querySelectorAll('button:not(:disabled)');
      const idx = Number(e.key) - 1;
      if (btns[idx]) btns[idx].click();
    }
  });

  // AudioContext解除 (iOS制約)
  document.body.addEventListener('pointerdown', getAudioCtx, { once: true });
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
